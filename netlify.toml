[build]
  # No build command needed — this is a static HTML site
  command = "echo 'Static site — no build required'"
  publish = "."

# Redirect rules
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
